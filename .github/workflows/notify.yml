name: Live Match Notifications

# Runs every 30 min during tournament hours so the pre-match window (45-75 min
# before kick-off) and post-match window (95-125 min after kick-off) are each
# hit by exactly one run per game.
#
# Coverage: 12:00-04:00 UTC = 08:00-00:00 CDT (all WC 2026 kick-off slots).
# Required secret: WEBHOOK_URL (Discord or Slack incoming webhook).

on:
  schedule:
    - cron: '0,30 12-23 * * *'   # 12:00–23:30 UTC
    - cron: '0,30 0-4   * * *'   # 00:00–04:30 UTC
  workflow_dispatch:              # manual trigger for testing

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Lightweight R install — no renv, no system deps, no Quarto.
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5'
          use-public-rspm: true

      # Only the five packages the script actually uses.
      - name: Install R packages
        run: |
          Rscript -e "
            pkgs <- c('httr', 'dplyr', 'jsonlite', 'lubridate', 'readr')
            missing <- pkgs[!pkgs %in% rownames(installed.packages())]
            if (length(missing))
              install.packages(missing, repos = 'https://cloud.r-project.org')
          "

      # Refresh fixtures so finished / scores are current.
      - name: Refresh WC fixtures
        run: |
          curl -sf --max-time 20 -o data/raw/wc2026_fixtures.json \
            "https://worldcup26.ir/get/games" \
            || echo "Fixture refresh failed — using committed fallback."

      - name: Send live notifications
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          # Override if most games are in a different timezone (PDT = -7, EDT = -4)
          # VENUE_UTC_OFFSET: '-5'
        run: Rscript scripts/09_live_notify.R

      # Commit the state file so dedup survives across runs.
      - name: Commit notification log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/notification_log.csv || true
          git diff --cached --quiet || \
            git commit -m "ci: update notification log [skip ci]"
          git push || true
