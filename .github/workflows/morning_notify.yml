name: Morning Match Overview

# Sends the daily fixture + value-bet overview to Discord once per morning.
# Scheduled at 08:00 Europe/Zurich (CEST = UTC+2 during WC 2026 = 06:00 UTC).
#
# Required secret: WEBHOOK_URL (Discord incoming webhook)

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 08:00 CEST (Zurich summer)
  workflow_dispatch:       # manual trigger for testing

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  morning-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5'
          use-public-rspm: true

      - name: Install R packages
        run: Rscript -e "install.packages(c('httr','dplyr','readr','lubridate'))"

      # Refresh fixtures so kick-off times and results are current.
      - name: Refresh WC fixtures
        run: |
          curl -sf --max-time 20 -o data/raw/wc2026_fixtures.json \
            "https://worldcup26.ir/get/games" \
            || echo "Fixture refresh failed -- using committed fallback."

      - name: Send morning overview
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TZ: Europe/Zurich
        run: Rscript scripts/08_send_notification.R
